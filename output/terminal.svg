<svg width="850" height="250" viewBox="0 0 850 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg:     #0d1117;
      --bar:    #161b22;
      --accent: #00FFAA;
      --border: #21262d;
      --muted:  #8b949e;
      --text:   #e6edf3;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:     #f6f8fa;
        --bar:    #eaeef2;
        --accent: #1a7f37;
        --border: #d0d7de;
        --muted:  #57606a;
        --text:   #1f2328;
      }
    }

    .t-window { fill: var(--bg); stroke: var(--border); stroke-width: 1.5; }
    .t-titlebar { fill: var(--bar); }

    /* traffic-light dots */
    .dot-r { fill: #ff5f56; }
    .dot-y { fill: #ffbd2e; }
    .dot-g { fill: #27c93f; }

    .t-title {
      font: 500 10px 'Segoe UI', Ubuntu, sans-serif;
      fill: var(--muted);
      text-anchor: middle;
      letter-spacing: 0.5px;
    }

    .t-mono  { font-family: 'JetBrains Mono','Cascadia Code','Courier New',monospace; }
    .t-sm    { font-size: 12px; fill: var(--text); }
    .t-xs    { font-size: 11px; fill: var(--text); }
    .t-muted { fill: var(--muted) !important; }
    .t-accent{ fill: var(--accent); }
    .t-label { fill: var(--text); font-size: 11px; }

    .t-bar-bg  { fill: var(--border); }
    .t-bar-fill{ }

    .t-divider { stroke: var(--border); stroke-width: 1; opacity: 0.7; }
    .t-vdivider{ stroke: var(--border); stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.5; }

    .t-cursor {
      fill: var(--accent);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .t-fadein {
      opacity: 0;
      animation: t-fade 0.4s ease forwards;
    }
    @keyframes t-fade {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .t-section-label {
      font: 700 9px 'Segoe UI', Ubuntu, sans-serif;
      fill: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2.5px;
    }
  </style>

  <!-- Card body -->
  <rect width="850" height="250" rx="12" class="t-window"/>

  <!-- Title bar -->
  <path d="M0 12 C0 5.37 5.37 0 12 0 H838 C844.63 0 850 5.37 850 12 V30 H0 Z"
        class="t-titlebar"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="15" r="4.5" class="dot-r"/>
  <circle cx="36" cy="15" r="4.5" class="dot-y"/>
  <circle cx="52" cy="15" r="4.5" class="dot-g"/>

  <!-- Window title -->
  <text x="425" y="20" class="t-title">system_info.sh — bash</text>

  <!-- Running indicator -->
  <circle cx="828" cy="15" r="3.5" fill="#00FFAA" style="animation:t-fade 1s ease-in-out infinite alternate;filter:drop-shadow(0 0 3px #00FFAA)"/>
  <text x="816" y="19" class="t-section-label" text-anchor="end">RUNNING</text>

  <!-- Left panel section label -->
  <text x="22" y="46" class="t-section-label">System Status</text>
  <line x1="22" y1="51" x2="257" y2="51" class="t-divider"/>

  <!-- Left panel content (metrics + status) -->
  
    <!-- CPU metric -->
    <text x="22" y="60" class="t-muted t-xs">CPU</text>
    <rect x="60" y="49" width="140" height="8" rx="3" class="t-bar-bg"/>
    <rect x="60" y="49" width="0" height="8" rx="3" fill="#00FFAAcc" class="t-bar-fill" style="filter:drop-shadow(0 0 3px #00FFAA88)">
      <animate attributeName="width" from="0" to="109" dur="0.8s" begin="0.0s" calcMode="spline"
               keyTimes="0;1" keySplines="0.4 0 0.2 1" fill="freeze"/>
    </rect>
    <text x="206" y="60" class="t-muted t-xs">78%</text>
    <!-- MEM metric -->
    <text x="22" y="100" class="t-muted t-xs">MEM</text>
    <rect x="60" y="89" width="140" height="8" rx="3" class="t-bar-bg"/>
    <rect x="60" y="89" width="0" height="8" rx="3" fill="#00FFAA99" class="t-bar-fill" style="filter:drop-shadow(0 0 3px #00FFAA88)">
      <animate attributeName="width" from="0" to="85" dur="0.8s" begin="0.3s" calcMode="spline"
               keyTimes="0;1" keySplines="0.4 0 0.2 1" fill="freeze"/>
    </rect>
    <text x="206" y="100" class="t-muted t-xs">61%</text>
    <!-- DISK metric -->
    <text x="22" y="140" class="t-muted t-xs">DISK</text>
    <rect x="60" y="129" width="140" height="8" rx="3" class="t-bar-bg"/>
    <rect x="60" y="129" width="0" height="8" rx="3" fill="#00FFAA99" class="t-bar-fill" style="filter:drop-shadow(0 0 3px #00FFAA88)">
      <animate attributeName="width" from="0" to="60" dur="0.8s" begin="0.6s" calcMode="spline"
               keyTimes="0;1" keySplines="0.4 0 0.2 1" fill="freeze"/>
    </rect>
    <text x="206" y="140" class="t-muted t-xs">43%</text>
    <g class="t-fadein" style="animation-delay:0.9s">
      <text x="22" y="190" class="t-muted t-xs">OS</text>
      <text x="80" y="190" class="t-accent t-xs">KALI LINUX</text>
    </g>
    <g class="t-fadein" style="animation-delay:1.1s">
      <text x="22" y="210" class="t-muted t-xs">ARCH</text>
      <text x="80" y="210" class="t-accent t-xs">x86_64</text>
    </g>
    <g class="t-fadein" style="animation-delay:1.3s">
      <text x="22" y="230" class="t-muted t-xs">UPTIME</text>
      <text x="80" y="230" class="t-accent t-xs">99.9%</text>
    </g>

  <!-- Vertical divider -->
  <line x1="272" y1="38" x2="272" y2="240" class="t-vdivider"/>

  <!-- Right panel content (terminal output) -->
  
    <!-- Prompt line -->
    <g class="t-fadein" style="animation-delay:0.05s">
      <text x="292" y="58" class="t-accent t-mono t-sm">
        <tspan class="t-muted">blackalex1</tspan>
        <tspan fill="#00FFAA">@github</tspan>
        <tspan class="t-muted">:~$</tspan>
        <tspan> cat whoami</tspan>
      </text>
    </g>
    <!-- Divider line under prompt -->
    <line x1="292" y1="66" x2="830" y2="66" class="t-divider"/>
    <g class="t-fadein" style="animation-delay:0.25s">
      <text x="292" y="90" class="t-mono t-sm">
        <tspan class="t-muted t-xs">›</tspan>
        <tspan dx="4" class="t-label"> role      </tspan>
        <tspan dx="2" class="t-muted">──</tspan>
        <tspan dx="4" class="t-accent" style="filter:drop-shadow(0 0 4px #00FFAA66)">Infosec Researcher / RE</tspan>
      </text>
    </g>
    <g class="t-fadein" style="animation-delay:0.43s">
      <text x="292" y="124" class="t-mono t-sm">
        <tspan class="t-muted t-xs">›</tspan>
        <tspan dx="4" class="t-label"> focus     </tspan>
        <tspan dx="2" class="t-muted">──</tspan>
        <tspan dx="4" class="t-accent" style="filter:drop-shadow(0 0 4px #00FFAA66)">Cybersecurity | C/C++ | Networking</tspan>
      </text>
    </g>
    <g class="t-fadein" style="animation-delay:0.61s">
      <text x="292" y="158" class="t-mono t-sm">
        <tspan class="t-muted t-xs">›</tspan>
        <tspan dx="4" class="t-label"> system    </tspan>
        <tspan dx="2" class="t-muted">──</tspan>
        <tspan dx="4" class="t-accent" style="filter:drop-shadow(0 0 4px #00FFAA66)">Linux / Windows Internals</tspan>
      </text>
    </g>
    <g class="t-fadein" style="animation-delay:0.79s">
      <text x="292" y="192" class="t-mono t-sm">
        <tspan class="t-muted t-xs">›</tspan>
        <tspan dx="4" class="t-label"> mindset   </tspan>
        <tspan dx="2" class="t-muted">──</tspan>
        <tspan dx="4" class="t-accent" style="filter:drop-shadow(0 0 4px #00FFAA66)">"Break to understand. Build better."</tspan>
      </text>
    </g>
    <!-- Bottom prompt + cursor -->
    <g class="t-fadein" style="animation-delay:1.07s">
      <text x="292" y="226" class="t-accent t-mono t-sm">
        <tspan class="t-muted">blackalex1@github:~$</tspan>
        <tspan> </tspan>
      </text>
      <rect x="455" y="213" width="8" height="14" class="t-cursor"/>
    </g>

</svg>