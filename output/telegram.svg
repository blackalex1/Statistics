<svg width="850" height="120" viewBox="0 0 850 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg:     #0d1117;
      --accent: #00FFAA;
      --dim:    #00FFAA18;
      --mid:    #00FFAA40;
      --border: #21262d;
      --muted:  #8b949e;
      --text:   #e6edf3;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:     #f6f8fa;
        --accent: #0969da;
        --dim:    #0969da12;
        --mid:    #0969da35;
        --border: #d0d7de;
        --muted:  #57606a;
        --text:   #1f2328;
      }
    }

    /* ---- base ---- */
    .bg   { fill: var(--bg); }
    .glow { fill: url(#c-radial); }
    .rim  { fill: none; stroke: var(--border); stroke-width: 1.5; }

    /* ---- scan line ---- */
    .scan {
      stroke: var(--accent);
      stroke-width: 1;
      opacity: 0;
      animation: scan-move 3.5s ease-in-out infinite;
    }
    @keyframes scan-move {
      0%   { opacity: 0; transform: translateX(-850px); }
      10%  { opacity: 0.35; }
      90%  { opacity: 0.35; }
      100% { opacity: 0; transform: translateX(850px); }
    }

    /* ---- signal rings (left) ---- */
    .sig {
      fill: none;
      stroke: var(--accent);
      animation: sig-pulse 2.4s ease-out infinite;
    }
    .sig1 { animation-delay: 0s; }
    .sig2 { animation-delay: 0.5s; }
    .sig3 { animation-delay: 1.0s; }
    @keyframes sig-pulse {
      0%   { opacity: 0.7; stroke-width: 1.5; }
      100% { opacity: 0;   stroke-width: 0.3; }
    }

    /* ---- center label ---- */
    .tag {
      font: 700 10px 'Segoe UI', Ubuntu, sans-serif;
      fill: var(--muted);
      text-transform: uppercase;
      letter-spacing: 4px;
      text-anchor: middle;
    }
    .handle {
      font: 800 28px 'JetBrains Mono', 'Cascadia Code', monospace;
      fill: var(--accent);
      letter-spacing: 2px;
      text-anchor: middle;
      filter: drop-shadow(0 0 8px #00FFAA88);
    }

    /* ---- deco lines ---- */
    .h-line {
      stroke: var(--accent);
      stroke-width: 1;
      opacity: 0.25;
    }
    .h-line-bright {
      stroke: var(--accent);
      stroke-width: 1;
      opacity: 0.6;
    }

    /* ---- status (right) ---- */
    .status-dot {
      fill: var(--accent);
      animation: blink 2s ease-in-out infinite;
      filter: drop-shadow(0 0 4px #00FFAA);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .status-ring {
      fill: none;
      stroke: var(--accent);
      opacity: 0.3;
      animation: ring-expand 2s ease-out infinite;
    }
    @keyframes ring-expand {
      0%   { r: 7;  opacity: 0.5; }
      100% { r: 18; opacity: 0; }
    }
    .status-txt {
      font: 700 9px 'Segoe UI', Ubuntu, sans-serif;
      fill: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .corner {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
      opacity: 0.45;
    }

    /* ---- right arrow bounce ---- */
    .arrow-g {
      animation: arrow-bounce 1.6s ease-in-out infinite;
    }
    @keyframes arrow-bounce {
      0%, 100% { transform: translateX(0); }
      50%       { transform: translateX(5px); }
    }
    .arrow-txt {
      font: 600 10px 'Segoe UI', Ubuntu, sans-serif;
      fill: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>

  <defs>
    <!-- Subtle radial glow in center -->
    <radialGradient id="c-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00FFAA" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="850" height="120" rx="14" class="bg"/>
  <rect width="850" height="120" rx="14" class="glow"/>
  <rect width="850" height="120" rx="14" class="rim"/>

  <!-- ─── Scanning line ─── -->
  <line x1="0" y1="60" x2="850" y2="60" class="scan"/>

  <!-- ─── Corner brackets ─── -->
  <g class="corner">
    <path d="M 18 32 L 18 18 L 32 18"/>
    <path d="M 818 18 L 832 18 L 832 32"/>
    <path d="M 18 88 L 18 102 L 32 102"/>
    <path d="M 818 102 L 832 102 L 832 88"/>
  </g>

  <!-- ─── LEFT: Signal rings emanating from icon ─── -->
  <!-- TG icon circle background -->
  <circle cx="90" cy="60" r="22" fill="#00FFAA14"/>
  <circle cx="90" cy="60" r="22" fill="none" stroke="#00FFAA" stroke-width="1" opacity="0.4"/>

  <!-- Telegram paper plane icon centred at (90, H/2) -->
  <g transform="translate(78, 49) scale(2.3)" class="status-dot" style="animation:none;filter:drop-shadow(0 0 6px #00FFAA88);">
    <path d="M1 5.5L11 1 9.5 10 6 8 4.5 9.5 4.5 7.5 9.5 3 3.5 7Z" fill="#00FFAA"/>
  </g>

  <!-- Signal arcs radiating to the right of icon -->
  <path d="M 118 48 A 15 15 0 0 1 118 72" class="sig sig1"/>
  <path d="M 126 40 A 24 24 0 0 1 126 80" class="sig sig2"/>
  <path d="M 135 31 A 33 33 0 0 1 135 89" class="sig sig3"/>

  <!-- ─── CENTER: Decorative lines + handle ─── -->
  <!-- Left deco line -->
  <line x1="160" y1="60" x2="280" y2="60" class="h-line"/>
  <line x1="280" y1="60" x2="295" y2="60" class="h-line-bright"/>

  <!-- Right deco line -->
  <line x1="555" y1="60" x2="570" y2="60" class="h-line-bright"/>
  <line x1="570" y1="60" x2="665" y2="60" class="h-line"/>

  <!-- Label -->
  <text x="425" y="42" class="tag">Telegram</text>

  <!-- Handle -->
  <text x="425" y="72" class="handle">@blackalex1</text>

  <!-- ─── RIGHT: Status indicator ─── -->
  <!-- Expanding ring animation -->
  <circle cx="770" cy="60" r="7" class="status-ring"/>

  <!-- Solid dot -->
  <circle cx="770" cy="60" r="5" class="status-dot"/>

  <!-- ONLINE label -->
  <text x="770" y="44" class="status-txt" text-anchor="middle">Online</text>

  <!-- Tap to connect CTA -->
  <g transform="translate(770, 78)" class="arrow-g">
    <text class="arrow-txt" text-anchor="middle" y="0">Connect &#x2192;</text>
  </g>

</svg>