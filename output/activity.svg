<svg width="850" height="300" viewBox="0 0 850 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FFAA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    :root { 
      --bg: #0d1117; 
      --accent: #00FFAA; 
      --text: #8b949e;
      --title-text: #00FFAA;
    }
    @media (prefers-color-scheme: light) {
      :root { 
        --bg: #ffffff; 
        --accent: #0969da; 
        --text: #57606a;
        --title-text: #1f2328;
      }
    }

    .bg { fill: var(--bg); stroke: #30363d; stroke-width: 1; }
    .grid-line { stroke: var(--text); stroke-opacity: 0.15; stroke-width: 1; stroke-dasharray: 3,3; }
    .axis-label { fill: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 11px; }
    .title { fill: var(--title-text); font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 18px; font-weight: bold; }
    
    .trend-line { 
      stroke: var(--accent); 
      stroke-width: 3; 
      fill: none; 
      filter: url(#glow);
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: drawLine 2s forwards ease-in-out;
    }
    
    .trend-area { 
      fill: url(#areaGradient); 
      opacity: 0;
      animation: fadeIn 1.5s 0.5s forwards;
    }

    .dot { 
      opacity: 0; 
      animation: fadeIn 0.3s forwards;
      stroke: var(--accent);
      stroke-width: 1;
    }

    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

