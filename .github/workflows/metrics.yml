name: GitHub Metrics Generator

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      username:
        description: 'GitHub Username'
        required: true
        default: 'blackalex1'
      telegram:
        description: 'Telegram Username'
        required: false
        default: 'blackalex1'
      color:
        description: 'Accent Color (Hex)'
        required: false
        default: '#00FFAA'
      graphs:
        description: 'Graphs to generate'
        required: false
        default: 'all'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false # Important for using custom token for push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Metrics SVGs
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          python generator.py --username "${{ github.event.inputs.username || 'blackalex1' }}" \
                             --telegram "${{ github.event.inputs.telegram || 'blackalex1' }}" \
                             --color "${{ github.event.inputs.color || '#00FFAA' }}" \
                             --graphs ${{ github.event.inputs.graphs || 'all' }}

      - name: Commit files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Prepare metrics branch logic
          mkdir -p temp_metrics
          cp -r output/*.svg temp_metrics/
          
          git fetch origin
          if git rev-parse --verify origin/metrics >/dev/null 2>&1; then
            git checkout metrics
          else
            git checkout --orphan metrics
            git rm -rf .
          fi
          
          mkdir -p output
          cp temp_metrics/*.svg output/
          git add output/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update metrics SVGs [skip ci]")

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.METRICS_TOKEN }}
          branch: metrics
          force: true
          directory: .
